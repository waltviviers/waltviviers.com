  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; }

    :root {
      --black:  #0C0C0B;
      --white:  #FAF9F7;
      --ink:    #FAF9F7;
      --stone:  #9A9890;
      --rule:   #2A2826;
      --bg:     #000000;
      --bg2:    #0D0D0D;
      --serif:  'EB Garamond', Georgia, serif;
      --sans:   'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 100px;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--rule);
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    nav.scrolled { height: 50px; }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .lang-toggle { display: flex; align-items: center; gap: 14px; }
    .lang-group { display: flex; align-items: center; cursor: pointer; user-select: none; }
    .lang-label, .lang-code {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--stone); font-family: var(--sans);
      transition: color 0.2s; line-height: 1;
    }
    .lang-label {
      max-width: 200px; overflow: hidden; white-space: nowrap;
      transition: max-width 0.3s ease, opacity 0.2s ease, color 0.2s;
    }
    .lang-pipe {
      font-size: 11px; color: var(--rule); padding: 0 4px; pointer-events: none;
      max-width: 20px; overflow: hidden; white-space: nowrap;
      transition: max-width 0.3s ease, opacity 0.2s ease;
    }
    .lang-group.active .lang-label,
    .lang-group.active .lang-code  { color: var(--ink); }
    .lang-group.active .lang-pipe  { color: var(--stone); }
    .nav-logo img { height: 36px; width: auto; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    nav.scrolled .nav-logo img { height: 28px; }
    .nav-links { display: flex; align-items: center; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: var(--sans); font-size: 12px; font-weight: 400;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--stone); transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a.is-current { color: var(--ink); }
    .nav-cta {
      font-size: 12px !important; font-weight: 500 !important;
      letter-spacing: 0.08em !important; color: var(--white) !important;
      padding: 7px 18px; border: 1px solid #4A4844;
      transition: background 0.2s, color 0.2s, border-color 0.2s !important;
    }
    .nav-cta:hover {
      background: var(--white) !important; color: var(--black) !important;
      border-color: var(--white) !important;
    }
    .social-icons { display: flex; align-items: center; gap: 16px; }
    .social-icons a, .social-icons button {
      display: flex; align-items: center; justify-content: center;
      color: var(--stone); transition: color 0.2s;
      background: none; border: none; padding: 0; cursor: pointer;
    }
    .social-icons a:hover, .social-icons button:hover { color: var(--white); }
    .social-icons svg {
      width: 18px; height: 18px; fill: none;
      stroke: currentColor; stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .theme-toggle {
      position: relative; width: 60px; height: 32px; border-radius: 16px;
      border: 1.5px solid #4A4844; background: transparent;
      cursor: pointer; padding: 0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .toggle-thumb {
      position: absolute; top: 4px; left: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="light"] .toggle-thumb { transform: translateX(28px); }
    .toggle-thumb .icon-moon, .toggle-thumb .icon-sun {
      width: 12px; height: 12px; fill: none; stroke: var(--bg);
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .toggle-thumb .icon-moon { display: block; }
    .toggle-thumb .icon-sun  { display: none; }
    nav.scrolled .lang-label,
    nav.scrolled .lang-pipe { max-width: 0; opacity: 0; padding: 0; }
    nav.scrolled .theme-toggle { width: auto; height: auto; border: none; padding: 4px; }
    nav.scrolled .toggle-thumb { position: static; width: auto; height: auto; background: none; border-radius: 0; transform: none !important; }
    nav.scrolled .toggle-thumb .icon-moon,
    nav.scrolled .toggle-thumb .icon-sun { width: 17px; height: 17px; stroke: var(--stone); }
    nav.scrolled .theme-toggle:hover .toggle-thumb .icon-moon,
    nav.scrolled .theme-toggle:hover .toggle-thumb .icon-sun { stroke: var(--ink); }

    /* ── Footer ── */
    footer {
      padding: 40px 48px; border-top: 1px solid var(--rule);
      display: flex; justify-content: center; align-items: center; position: relative;
    }
    .footer-mark { position: absolute; top: 50%; right: 0; transform: translateY(-50%); line-height: 0; }
    .footer-mark img { display: block; }
    [data-theme="light"] .footer-mark img { filter: invert(1); }
    .footer-social { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .footer-social .social-icons { gap: 24px; }
    .footer-social .social-icons a { color: var(--stone); }
    .footer-social .social-icons svg { width: 22px; height: 22px; }
    .footer-social .social-icons a:hover { color: var(--white); }
    .footer-copy { font-size: 11px; color: var(--stone); letter-spacing: 0.06em; text-align: center; }
    .footer-admin {
      position: absolute; top: 50%; transform: translateY(-50%); left: 48px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--stone); padding: 7px 16px; border: 1px solid var(--rule);
      transition: border-color 0.2s, color 0.2s; background: none;
    }
    .footer-admin:hover { border-color: var(--stone); color: var(--ink); }

    /* ── Light mode ── */
    [data-theme="light"] {
      --ink: #0C0C0B; --stone: #6B6560; --rule: #D5D1CB;
      --bg: #F5F3EF; --bg2: #EDEAE5;
    }
    [data-theme="light"] body { background: #F5F3EF; }
    [data-theme="light"] nav { background: rgba(245,243,239,0.95); }
    [data-theme="light"] .nav-logo img { filter: invert(1); opacity: 1; }
    [data-theme="light"] .nav-links a:hover { color: var(--ink); }
    [data-theme="light"] .theme-toggle { border-color: #D5D1CB; }
    [data-theme="light"] .toggle-thumb .icon-moon { display: none; }
    [data-theme="light"] .toggle-thumb .icon-sun  { display: block; }
    [data-theme="light"] .nav-cta { color: #0C0C0B !important; border-color: #D5D1CB !important; }
    [data-theme="light"] .nav-cta:hover { background: #0C0C0B !important; color: #FAF9F7 !important; border-color: #0C0C0B !important; }
    [data-theme="light"] .footer-admin:hover { color: #0C0C0B; border-color: #6B6560; }
    [data-theme="light"] .footer-social .social-icons a:hover { color: var(--ink); }

    /* ── Page layout ── */
    .page-wrap { padding-top: 100px; }

    .page-head {
      padding: 64px 48px 48px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--rule);
    }

    .page-head h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .page-head-meta { display: flex; align-items: center; gap: 24px; }
    .photos-count { font-size: 12px; color: var(--stone); letter-spacing: 0.06em; }
    .back-link {
      font-size: 12px; letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--stone); transition: color 0.2s;
    }
    .back-link:hover { color: var(--ink); }

    /* ── Photo grid ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background-color: #0D0D0D;
    }

    .photo-card {
      background: var(--bg2);
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      color: inherit;
      text-decoration: none;
    }
    .photo-card:hover { background: #222120; }

    .photo-card-info {
      order: -1;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }
    .photo-card-title { font-family: var(--serif); font-size: 17px; }
    .photo-card-meta { font-size: 12px; color: var(--stone); white-space: nowrap; }

    .photo-card-img {
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #0D0D0D;
      position: relative;
    }
    .photo-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
      display: block;
    }
    a.photo-card:hover .photo-card-img img { transform: scale(1.03); }

    /* "View on Google Photos" affordance */
    .album-badge {
      position: absolute; bottom: 8px; left: 8px;
      font-family: var(--sans); font-size: 0.62rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 4px 9px; border-radius: 2px;
      line-height: 1.5; pointer-events: none; z-index: 2;
      color: #fff; background: rgba(0, 0, 0, 0.62);
      opacity: 0; transition: opacity 0.2s;
    }
    .photo-card:hover .album-badge,
    .photo-card-img.is-placeholder .album-badge { opacity: 1; }

    /* Placeholder tile (until a cover image is added) */
    .photo-card-img.is-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-card-img.is-placeholder svg {
      width: 40px; height: 40px; fill: none;
      stroke: var(--rule); stroke-width: 1.25;
      stroke-linecap: round; stroke-linejoin: round;
    }
    [data-theme="light"] .photo-card-img.is-placeholder svg { stroke: #C7C2BB; }

    /* Empty / error states */
    .grid-message {
      grid-column: 1 / -1;
      padding: 96px 48px;
      text-align: center;
      color: var(--stone);
      font-family: var(--serif);
      font-size: clamp(1.1rem, 2vw, 1.5rem);
    }

    /* Loading skeleton */
    .skeleton { background: var(--bg2); animation: pulse 1.5s ease-in-out infinite; }
    .skeleton-info { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .skeleton-line { height: 14px; border-radius: 2px; background: var(--rule); }
    .skeleton-img { aspect-ratio: 4/3; background: var(--rule); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Light mode grid overrides */
    [data-theme="light"] .photo-grid { background-color: #F5F3EF; }
    [data-theme="light"] .photo-card  { background: #EDEAE5; }
    [data-theme="light"] .photo-card:hover { background: #E0DDD8; }
    [data-theme="light"] .photo-card-img { background: #DDD9D4; }
    [data-theme="light"] .skeleton-line { background: #D5D1CB; }
    [data-theme="light"] .skeleton-img  { background: #D5D1CB; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      nav { padding: 0 24px; height: 50px; }
      .nav-logo img { height: 28px; }
      .nav-links { gap: 20px; }
      .nav-link-hide { display: none; }
      .lang-label, .lang-pipe { display: none; }
      .theme-toggle { width: auto; height: auto; border: none; padding: 4px; }
      .toggle-thumb { position: static; width: auto; height: auto; background: none; border-radius: 0; transform: none !important; }
      .toggle-thumb .icon-moon,
      .toggle-thumb .icon-sun { width: 17px; height: 17px; stroke: var(--stone); }
      .theme-toggle:hover .toggle-thumb .icon-moon,
      .theme-toggle:hover .toggle-thumb .icon-sun { stroke: var(--ink); }

      .page-wrap { padding-top: 50px; }
      .page-head { padding: 40px 24px 32px; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }

      footer { padding: 40px 24px 32px; flex-direction: column; gap: 28px; }
      .footer-admin { position: static; transform: none; order: 1; }
      .footer-social { order: 0; }
      .footer-mark { position: static; transform: none; order: 2; }
    }

    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .footer-admin { display: none; }
    }
  </style>
</head>

  <script>
    (function() {
      var LANG = {
        en: { 'nav-artworks':'Artworks','nav-photography':'Photography','nav-about':'About','nav-enquire':'Enquire','page-title':'Photography','back-home':'← Back to home','email-href':'mailto:artist@waltviviers.com','email-fallback':'Could not send. Email artist@waltviviers.com directly.','count-suffix':'album','count-suffix-plural':'albums','view-album':'View on Google Photos','untitled-album':'Untitled album','coming-soon':'Coming soon','empty':'Albums coming soon.','load-error':'Could not load albums.' },
        af: { 'nav-artworks':'Kunswerke','nav-photography':'Fotografie','nav-about':'Oor my','nav-enquire':'Navraag','page-title':'Fotografie','back-home':'← Terug na tuis','email-href':'mailto:kunstenaar@waltviviers.com','email-fallback':'Kon nie stuur nie. E-pos kunstenaar@waltviviers.com direk.','count-suffix':'album','count-suffix-plural':'albums','view-album':'Sien op Google Foto\'s','untitled-album':'Naamlose album','coming-soon':'Binnekort beskikbaar','empty':'Albums binnekort beskikbaar.','load-error':'Kon nie albums laai nie.' }
      };
      var lang = localStorage.getItem('wv-lang') || 'en';
      window._t = function (k) { return (LANG[lang] && LANG[lang][k] !== undefined) ? LANG[lang][k] : k; };
      function applyLang(l) {
        lang = l; localStorage.setItem('wv-lang', l);
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
          var k = el.dataset.i18n;
          if (LANG[l] && LANG[l][k] !== undefined) el.textContent = LANG[l][k];
        });
        document.querySelectorAll('[data-i18n-href]').forEach(function(el) {
          var k = el.dataset.i18nHref;
          if (LANG[l] && LANG[l][k] !== undefined) el.href = LANG[l][k];
        });
        document.getElementById('lang-en').classList.toggle('active', l === 'en');
        document.getElementById('lang-af').classList.toggle('active', l === 'af');
        if (window._renderPhotos) window._renderPhotos();
      }
      document.getElementById('lang-en').addEventListener('click', function() { applyLang('en'); });
      document.getElementById('lang-af').addEventListener('click', function() { applyLang('af'); });
      window._applyLang = applyLang;
      window._initLang = lang;
    })();
  </script>
  <script>
    (function () {
      var albums = [];
      var grid = document.getElementById('photo-grid');
      var countEl = document.getElementById('photos-count');

      var STACK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
        });
      }

      function isUrl(u) { return u && /^https?:\/\//i.test(String(u).trim()); }

      function cardHTML(a) {
        var hasCover = a.cover && String(a.cover).trim() !== '';
        var title    = a.title && String(a.title).trim() !== '' ? esc(a.title) : window._t('untitled-album');
        var date     = a.date ? esc(a.date) : '';
        var info     = '<div class="photo-card-info"><span class="photo-card-title">' + title + '</span>' +
                       (date ? '<span class="photo-card-meta">' + date + '</span>' : '') + '</div>';
        var badge    = '<span class="album-badge">' + window._t('view-album') + ' ↗</span>';
        var media;
        if (hasCover) {
          var src = isUrl(a.cover) ? esc(a.cover) : '/' + String(a.cover).replace(/^\/+/, '');
          media = '<div class="photo-card-img"><img src="' + src + '" alt="' + title + '" loading="lazy" />' + badge + '</div>';
        } else {
          media = '<div class="photo-card-img is-placeholder">' + STACK_SVG + badge + '</div>';
        }
        if (isUrl(a.url)) {
          return '<a href="' + esc(a.url) + '" target="_blank" rel="noopener" class="photo-card">' + info + media + '</a>';
        }
        return '<div class="photo-card">' + info + media + '</div>';
      }

      function render() {
        if (!albums.length) {
          grid.innerHTML = '<p class="grid-message">' + window._t('empty') + '</p>';
          countEl.textContent = '';
          return;
        }
        grid.innerHTML = albums.map(cardHTML).join('');
        var suf = albums.length === 1 ? window._t('count-suffix') : window._t('count-suffix-plural');
        countEl.textContent = albums.length + ' ' + suf;
      }
      window._renderPhotos = render;

      fetch('/data/photography.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          albums = (data && data.albums) || [];
          render();
        })
        .catch(function () {
          grid.innerHTML = '<p class="grid-message">' + window._t('load-error') + '</p>';
          countEl.textContent = '';
        });

      // Apply saved language now that render hooks exist
      if (window._applyLang) window._applyLang(window._initLang || 'en');
    })();
  </script>
