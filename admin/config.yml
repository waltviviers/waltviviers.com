backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: images

locale: en

collections:
  - name: artworks
    label: Artworks
    files:
      - name: artworks
        label: Artwork List
        file: data/artworks.json
        fields:
          - name: artworks
            label: Artworks
            widget: list
            add_to_top: true
            fields:
              - { name: title, label: Title, widget: string }
              - { name: year, label: Year, widget: string, hint: "e.g. 2024" }
              - name: medium
                label: Medium
                widget: string
                required: false
                hint: "e.g. Oil on canvas"
              - name: dimensions
                label: Dimensions
                widget: string
                required: false
                hint: "e.g. 90 × 70 cm"
              - name: available
                label: Availability
                widget: select
                options:
                  - { label: "Available for sale", value: "available" }
                  - { label: "Sold", value: "sold" }
                  - { label: "Enquire", value: "enquire" }
                default: enquire
              - name: featured
                label: "Show first in hero"
                widget: boolean
                default: false
              - name: image
                label: Image
                widget: image
              - name: instagram
                label: "Instagram link (optional)"
                widget: string
                required: false
                hint: "e.g. https://www.instagram.com/p/ABC123/"
