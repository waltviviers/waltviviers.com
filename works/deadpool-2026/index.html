<head>

  <script type="application/ld+json">{"@context":"https://schema.org","@type":"VisualArtwork","name":"Deadpool","dateCreated":"2026","image":"https://waltviviers.com/images/deadpool-acrylic-canvas-walt-viviers-2026.webp","url":"https://waltviviers.com/works/deadpool-2026/","creator":{"@type":"Person","name":"Walt Viviers","url":"https://waltviviers.com"},"artMedium":"Acrylic on Canvas","size":"20 x 20 cm"}</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c; --fg: #e8e6e1; --stone: #888;
      --border: rgba(255,255,255,0.1);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #F5F3EF; --fg: #0c0c0c; --stone: #666; --border: rgba(0,0,0,0.1); }
    }

    body { background: var(--bg); color: var(--fg); font-family: var(--sans); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-back  { font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.55; }
    .nav-back:hover { opacity: 1; }

    .artwork-wrap { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

    .artwork-img { width: 100%; height: auto; display: block; max-height: 72vh; object-fit: contain; object-position: left; margin-bottom: 36px; }

    .artwork-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; }
    h1 { font-family: var(--serif); font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 400; line-height: 1.1; }
    .artwork-year { font-family: var(--serif); font-size: clamp(1.1rem, 3vw, 1.6rem); font-style: italic; color: var(--stone); margin-top: 4px; }

    .status-badge { display: inline-block; font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; font-family: var(--sans); color: #fff; }
    .available { background: rgba(28,90,45,0.88); }
    .sold      { background: rgba(90,25,25,0.88); }
    .enquire   { background: rgba(255,255,255,0.15); color: var(--fg); }

    .artwork-meta { border-top: 1px solid var(--border); margin-bottom: 32px; }
    .meta-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .meta-label { color: var(--stone); }
    .meta-value { font-weight: 500; }

    .artwork-actions { display: flex; flex-direction: column; gap: 12px; }
    .btn { display: block; text-align: center; padding: 16px 24px; font-size: 0.76rem; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--sans); cursor: pointer; border: none; width: 100%; }
    .btn-primary  { background: var(--fg); color: var(--bg); }
    .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    .btn:hover { opacity: 0.8; }

    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-group label { font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--stone); }
    .form-group input, .form-group textarea {
      background: transparent; border: 1px solid var(--border); color: var(--fg);
      padding: 10px 12px; font-size: 0.9rem; font-family: var(--sans); outline: none; width: 100%;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--stone); }
    .form-error { font-size: 0.82rem; color: #c0392b; margin: 8px 0; }
    .form-success { text-align: center; padding: 24px 0; }
    .form-success p { margin-bottom: 16px; opacity: 0.8; font-size: 0.9rem; }

    @media (min-width: 640px) {
      .nav { padding: 24px 40px; }
      .artwork-wrap { padding: 60px 40px 100px; }
      .artwork-actions { flex-direction: row; }
      .btn { width: auto; flex: 1; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">Walt</a>
    <a href="/" class="nav-back">← All works</a>
  </nav>

  <main class="artwork-wrap">
    <img class="artwork-img"
         src="/images/deadpool-acrylic-canvas-walt-viviers-2026.webp"
         srcset="/images/800/deadpool-acrylic-canvas-walt-viviers-2026.webp 800w, /images/deadpool-acrylic-canvas-walt-viviers-2026.webp 1600w"
         sizes="(max-width: 900px) 100vw, 900px"
         alt="Walt Viviers, Deadpool, 2026, Acrylic on Canvas"
         fetchpriority="high" />

    <div class="artwork-header">
      <div>
        <h1>Deadpool</h1>
        <div class="artwork-year">2026</div>
      </div>
      <span class="status-badge enquire">Enquire</span>
    </div>

    <div class="artwork-meta">
      <div class="meta-row"><span class="meta-label">Medium</span><span class="meta-value">Acrylic on Canvas</span></div>
      <div class="meta-row"><span class="meta-label">Dimensions</span><span class="meta-value">20 x 20 cm</span></div>
      <div class="meta-row"><span class="meta-label">Status</span><span class="meta-value">Enquire</span></div>
    </div>

    <div class="artwork-actions">
      <button class="btn btn-primary" onclick="toggleForm()">Enquire about this work</button>
      <a href="/" class="btn btn-secondary">View all works</a>
    </div>
    
  <div class="enquiry-section" id="enquiry-section" hidden>
    <form id="enquiry-form" style="margin-top:24px">
      <input type="hidden" name="_subject" value="Enquiry: Deadpool" />
      <input type="hidden" name="artwork"  value="Deadpool, 2026" />
      <div class="form-group">
        <label for="f-name">Name</label>
        <input type="text" id="f-name" name="name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="f-email">Email</label>
        <input type="email" id="f-email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="f-msg">Message</label>
        <textarea id="f-msg" name="message" rows="4" placeholder="I'm interested in this work…"></textarea>
      </div>
      <p class="form-error" id="form-error" hidden></p>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top:4px">Send enquiry</button>
    </form>
    <div class="form-success" id="form-success" hidden>
      <p>Thank you — your message has been sent. Walt will be in touch shortly.</p>
      <a href="/" class="btn btn-secondary">Back to gallery</a>
    </div>
  </div>
  </main>
  
  <script>
    function toggleForm() {
      var sec = document.getElementById('enquiry-section');
      sec.hidden = !sec.hidden;
    }
    document.getElementById('enquiry-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('submit-btn');
      var errEl = document.getElementById('form-error');
      btn.disabled = true; btn.textContent = '…'; errEl.hidden = true;
      try {
        var res = await fetch('https://formspree.io/f/mrevzark', {
          method: 'POST', body: new FormData(this), headers: { Accept: 'application/json' }
        });
        if (res.ok) {
          this.hidden = true;
          document.getElementById('form-success').hidden = false;
        } else {
          var d = await res.json();
          errEl.textContent = (d.errors||[]).map(function(x){return x.message;}).join(', ') || 'Something went wrong.';
          errEl.hidden = false; btn.disabled = false; btn.textContent = 'Send enquiry';
        }
      } catch(_) {
        errEl.textContent = 'Could not send. Email waltviviers.art@gmail.com directly.';
        errEl.hidden = false; btn.disabled = false; btn.textContent = 'Send enquiry';
      }
    });
  </script>
</body>
</html>
